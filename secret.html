<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SECRET NODE v25</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --accent: #34a853; --bg: #000; --panel: #0a0a0a; --border: #1a1a1a; --text: #888; }
        * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
        body { font-family: 'Inter', sans-serif; background: var(--bg); color: #fff; overflow-x: hidden; }

        /* --- WATERMARK OVERLAY --- */
        .watermark-layer {
            position: fixed; inset: 0; z-index: 9999; pointer-events: none;
            display: grid; grid-template-columns: repeat(3, 1fr);
            opacity: 0.15; overflow: hidden; transform: rotate(-30deg) scale(1.5);
        }
        .wm-txt { font-weight: 900; font-size: 12px; color: #fff; white-space: nowrap; padding: 40px; }

        /* --- STICKY NAV --- */
        header {
            position: sticky; top: 0; z-index: 5000;
            background: rgba(0,0,0,0.95); backdrop-filter: blur(15px);
            border-bottom: 1px solid var(--border);
        }
        .top-bar { padding: 15px 20px; display: flex; justify-content: space-between; align-items: center; }
        .filter-bar { 
            display: flex; overflow-x: auto; padding: 0 15px 15px; gap: 10px; 
            scrollbar-width: none; -ms-overflow-style: none;
        }
        .filter-btn {
            background: #111; border: 1px solid var(--border); color: var(--text);
            padding: 10px 20px; border-radius: 12px; font-size: 10px; font-weight: 900;
            white-space: nowrap; transition: 0.3s;
        }
        .filter-btn.active { background: var(--accent); color: #fff; border-color: var(--accent); }

        /* --- CONTENT --- */
        .container { padding: 15px; position: relative; z-index: 100; }
        .asset-card { background: var(--panel); border: 1px solid var(--border); border-radius: 15px; margin-bottom: 15px; overflow: hidden; }
        .asset-card img { width: 100%; display: block; filter: contrast(1.1); }
        
        /* --- FULLSCREEN VIEWER --- */
        #fs-overlay {
            position: fixed; inset: 0; background: #000; z-index: 10000;
            display: none; flex-direction: column; align-items: center; justify-content: center;
        }
        #fs-img { max-width: 95%; max-height: 80%; transition: transform 0.3s ease; }
        .fs-tools { position: absolute; bottom: 40px; display: flex; gap: 20px; }
        .tool-btn { background: #1a1a1a; color: #fff; border: 1px solid #333; width: 60px; height: 60px; border-radius: 50%; font-size: 20px; }

        #sync-indicator { position: fixed; top: 70px; right: 20px; font-size: 8px; color: var(--accent); font-weight: 900; opacity: 0.5; }
    </style>
</head>
<body>

<div class="watermark-layer" id="wm-layer"></div>

<header>
    <div class="top-bar">
        <div id="subLabel" style="font-weight:900; color:var(--accent); font-size:12px; letter-spacing:2px;">...</div>
        <button onclick="window.location.href='index.html'" style="background:none; border:none; color:#444; font-size:18px;"><i class="fa fa-times"></i></button>
    </div>
    <div class="filter-bar">
        <button class="filter-btn active" onclick="filterAssets('ALL', this)">ALL ASSETS</button>
        <button class="filter-btn" onclick="filterAssets('QUESTION', this)">QUESTIONS</button>
        <button class="filter-btn" onclick="filterAssets('ANSWER', this)">ANSWERS</button>
        <button class="filter-btn" onclick="filterAssets('PRACTICAL', this)">PRACTICAL</button>
    </div>
</header>

<div id="sync-indicator">PULSE: SYNCED</div>

<div class="container" id="mainContainer">
    <div id="assetList" style="display: grid; gap: 15px;"></div>
</div>

<!-- Fullscreen Viewer -->
<div id="fs-overlay">
    <button onclick="closeFS()" style="position:absolute; top:30px; right:30px; color:#fff; background:none; border:none; font-size:30px;"><i class="fa fa-times"></i></button>
    <img id="fs-img" src="">
    <div class="fs-tools">
        <button class="tool-btn" onclick="rotate(-90)"><i class="fa fa-rotate-left"></i></button>
        <button class="tool-btn" onclick="rotate(90)"><i class="fa fa-rotate-right"></i></button>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getFirestore, doc, getDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

    const config = {
        apiKey: "AIzaSyCV_DNVJwg9fE_ND9lwqfzAYVAi-MZDfj0",
        authDomain: "exam-key-7943c.firebaseapp.com",
        projectId: "exam-key-7943c",
        storageBucket: "exam-key-7943c.firebasestorage.app",
        messagingSenderId: "712629635682",
        appId: "1:712629635682:web:dc063709ca6ecdb85c1f3b"
    };

    const app = initializeApp(config);
    const db = getFirestore(app);

    let allAssets = [];
    let currentRotation = 0;

    // --- WATERMARK GEN ---
    const wmLayer = document.getElementById('wm-layer');
    for(let i=0; i<60; i++) {
        const span = document.createElement('div');
        span.className = 'wm-txt';
        span.innerText = 'EXAM KEY LEAK • STRING DEFENCE';
        wmLayer.appendChild(span);
    }

    async function fetchPulse() {
        const vid = localStorage.getItem('activeVaultID');
        if(!vid) return;
        
        try {
            const snap = await getDoc(doc(db, "vault", vid));
            if(snap.exists()) {
                allAssets = snap.data().images || [];
                document.getElementById('subLabel').innerText = snap.data().subjectName;
                render('ALL');
                
                const ind = document.getElementById('sync-indicator');
                ind.innerText = "PULSE: UPDATED " + new Date().toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'});
            }
        } catch(e) { console.log("Pulse Latency"); }
    }

    window.filterAssets = (type, btn) => {
        document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        render(type);
    };

    function render(filter) {
        const list = document.getElementById('assetList');
        const filtered = filter === 'ALL' ? allAssets : allAssets.filter(a => a.type === filter);
        
        list.innerHTML = filtered.map(a => `
            <div class="asset-card" onclick="openFS('${a.url}')">
                <img src="${a.url}" loading="lazy">
                <div style="padding:10px; font-size:8px; font-weight:900; color:#444;">${a.type}</div>
            </div>
        `).join('');
    }

    // --- ROTATION LOGIC ---
    window.openFS = (url) => {
        currentRotation = 0;
        const img = document.getElementById('fs-img');
        img.src = url;
        img.style.transform = `rotate(0deg)`;
        document.getElementById('fs-overlay').style.display = 'flex';
    };

    window.rotate = (deg) => {
        currentRotation += deg;
        document.getElementById('fs-img').style.transform = `rotate(${currentRotation}deg)`;
    };

    window.closeFS = () => document.getElementById('fs-overlay').style.display = 'none';

    // Initial Load & 1 Minute Pulse
    fetchPulse();
    setInterval(fetchPulse, 60000); 
</script>
</body>
</html>
