<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>SECURE_NODE_V15</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --accent: #34a853; --bg: #000; --panel: #050505; --border: #111; --danger: #ea4335; }
        * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
        
        body { 
            font-family: 'Inter', sans-serif; background: var(--bg); color: #fff; 
            overflow: hidden; height: 100vh; width: 100vw;
            user-select: none; -webkit-touch-callout: none;
        }

        /* WATERMARK SHIELD */
        #wm-layer {
            position: fixed; inset: 0; z-index: 99999; pointer-events: none;
            display: grid; grid-template-columns: repeat(4, 1fr);
            opacity: 0.08; transform: rotate(-25deg) scale(2);
        }
        .wm-unit { font-weight: 950; font-size: 7px; color: #fff; padding: 25px; white-space: nowrap; animation: flicker 2s infinite; }
        @keyframes flicker { 0%, 100% { opacity: 0.3; } 50% { opacity: 1; } }

        /* CLEAN TOP HEADER (No Code/Key Pills) */
        #top-fixed {
            position: fixed; top: 0; width: 100%; z-index: 5000;
            background: rgba(0,0,0,0.98); backdrop-filter: blur(30px);
            border-bottom: 1px solid var(--border);
            padding: 15px 20px; display: flex; justify-content: space-between; align-items: center;
        }
        .exit-btn { background: #111; border: 1px solid #222; color: #fff; padding: 8px 15px; border-radius: 8px; font-size: 10px; font-weight: 900; }

        /* SCROLLABLE VIEWPORT */
        #main-view {
            margin-top: 70px; 
            height: calc(100vh - 70px);
            overflow-y: scroll; padding: 0 20px 120px;
        }

        /* FILTER TABS - STICKY */
        .tabs { 
            display: flex; gap: 8px; position: sticky; top: 0; 
            background: var(--bg); z-index: 10; padding: 15px 0;
        }
        .tab-btn { flex: 1; background: #080808; border: 1px solid #111; color: #444; padding: 12px; border-radius: 10px; font-size: 9px; font-weight: 950; }
        .tab-btn.active { background: var(--accent); color: #fff; border-color: var(--accent); }

        /* INSTRUCTIONS PANEL (NOW BELOW TABS) */
        .intel-box {
            background: #030303; border: 1px solid #111; border-radius: 12px;
            padding: 15px; margin-bottom: 20px; border-left: 3px solid var(--accent);
        }
        .intel-label { font-size: 7px; color: #222; font-weight: 900; letter-spacing: 2px; display: block; margin-bottom: 8px; }
        .intel-content { font-size: 12px; color: #888; font-family: monospace; line-height: 1.5; white-space: pre-wrap; }

        /* IMAGE CARDS */
        .asset-card { background: var(--panel); border: 1px solid var(--border); border-radius: 15px; margin-bottom: 20px; overflow: hidden; }
        .asset-card img { width: 100%; display: block; filter: contrast(1.1); }

        /* STATUS MODAL (For Empty States) */
        .status-modal {
            background: #080000; border: 1px solid #200; border-radius: 15px;
            padding: 40px 20px; text-align: center; margin-top: 50px;
        }
        .status-icon { font-size: 30px; color: var(--danger); margin-bottom: 15px; display: block; animation: pulse-red 2s infinite; }
        .status-msg { font-size: 11px; font-weight: 900; color: #444; letter-spacing: 2px; margin-bottom: 20px; }
        .sync-btn { background: #111; border: 1px solid #222; color: #fff; padding: 12px 25px; border-radius: 30px; font-size: 9px; font-weight: 900; }

        /* FULLSCREEN + ZOOM */
        #fs-overlay { position: fixed; inset: 0; background: #000; z-index: 100000; display: none; align-items: center; justify-content: center; overflow: hidden; }
        #fs-img { max-width: 100%; max-height: 100%; transition: transform 0.1s ease-out; touch-action: none; }
        .fs-close { position: absolute; top: 40px; right: 20px; background: rgba(255,255,255,0.05); color: #fff; border: none; width: 45px; height: 45px; border-radius: 50%; z-index: 100001; }

        @keyframes pulse-red { 0% { opacity: 0.4; } 50% { opacity: 1; } 100% { opacity: 0.4; } }
        #sync-loader { position: fixed; inset: 0; background: #000; z-index: 200000; display: flex; justify-content: center; align-items: center; }
        .spinner { width: 30px; height: 30px; border: 2px solid #111; border-top-color: var(--accent); border-radius: 50%; animation: spin 0.8s linear infinite; }
        @keyframes spin { 100% { transform: rotate(360deg); } }
    </style>
</head>
<body oncontextmenu="return false;">

<div id="wm-layer"></div>
<div id="sync-loader"><div class="spinner"></div></div>

<div id="top-fixed">
    <button class="exit-btn" onclick="window.location.href='index.html'">EXIT_NODE</button>
    <div id="subLabel" style="font-weight:950; color:var(--accent); font-size:11px; letter-spacing:3px;">PULSE_SECURE</div>
    <i class="fa fa-circle-dot" style="font-size:8px; color:var(--accent); animation: flicker 1s infinite;"></i>
</div>

<div id="main-view">
    <div class="tabs">
        <button class="tab-btn active" onclick="setFilter('QUESTION', this)">QUESTIONS</button>
        <button class="tab-btn" onclick="setFilter('ANSWER', this)">ANSWERS</button>
        <button class="tab-btn" onclick="setFilter('PRACTICAL', this)">PRACTICAL</button>
    </div>

    <div class="intel-box" id="intelBox">
        <span class="intel-label">RAW_INTEL_FLOW</span>
        <div class="intel-content" id="intelTxt">STREAM_INITIATING...</div>
    </div>

    <div id="grid"></div>
</div>

<div id="fs-overlay">
    <button class="fs-close" onclick="closeFS()"><i class="fa fa-times"></i></button>
    <img id="fs-img" src="" ontouchstart="zStart(event)" ontouchmove="zMove(event)" ontouchend="zEnd(event)">
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getFirestore, doc, onSnapshot, getDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

    const config = {
        apiKey: "AIzaSyCV_DNVJwg9fE_ND9lwqfzAYVAi-MZDfj0",
        authDomain: "exam-key-7943c.firebaseapp.com",
        projectId: "exam-key-7943c",
        storageBucket: "exam-key-7943c.firebasestorage.app",
        messagingSenderId: "712629635682",
        appId: "1:712629635682:web:dc063709ca6ecdb85c1f3b"
    };

    const app = initializeApp(config);
    const db = getFirestore(app);
    const vaultID = localStorage.getItem('activeVaultID');

    let currentAssets = [];
    let activeType = 'QUESTION';

    // 1-SECOND PULSE ENGINE
    function initSync() {
        if(!vaultID) return;
        onSnapshot(doc(db, "vault", vaultID), (snap) => {
            if(snap.exists()) {
                const d = snap.data();
                currentAssets = d.images || [];
                document.getElementById('subLabel').innerText = (d.subjectName || "VAULT").toUpperCase();
                document.getElementById('intelTxt').innerText = d.textIntel || "NO_RAW_DATA_DEPLOYED";
                render();
            }
            document.getElementById('sync-loader').style.display = 'none';
        });
    }

    window.manualSync = async () => {
        const btn = document.querySelector('.sync-btn');
        if(btn) btn.innerText = "SYNCING...";
        const snap = await getDoc(doc(db, "vault", vaultID));
        if(snap.exists()) render();
        if(btn) btn.innerText = "FORCE REFRESH";
    };

    window.setFilter = (type, btn) => {
        activeType = type;
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        render();
    }

    function render() {
        const grid = document.getElementById('grid');
        const filtered = currentAssets.filter(a => a.type === activeType);
        
        if(filtered.length === 0) {
            grid.innerHTML = `
                <div class="status-modal">
                    <i class="fa fa-triangle-exclamation status-icon"></i>
                    <div class="status-msg">INTEL NOT UPLOADED YET<br><span style="font-size:7px; opacity:0.5;">WAITING FOR ADMIN DEPLOYMENT</span></div>
                    <button class="sync-btn" onclick="manualSync()">FORCE REFRESH</button>
                </div>`;
            return;
        }

        grid.innerHTML = filtered.map(a => `
            <div class="asset-card" onclick="openFS('${a.url}')">
                <img src="${a.url}" loading="lazy">
                <div style="padding:12px; font-size:7px; font-weight:900; color:#1a1a1a;">SECURE_DATA_NODE</div>
            </div>
        `).join('');
    }

    // ZOOM & FULLSCREEN
    let scale = 1, lastDist = 0;
    window.openFS = (url) => {
        document.getElementById('top-fixed').style.display = 'none';
        document.getElementById('main-view').style.display = 'none';
        document.getElementById('fs-img').src = url;
        document.getElementById('fs-overlay').style.display = 'flex';
        scale = 1; document.getElementById('fs-img').style.transform = `scale(1)`;
    };
    window.closeFS = () => {
        document.getElementById('top-fixed').style.display = 'flex';
        document.getElementById('main-view').style.display = 'block';
        document.getElementById('fs-overlay').style.display = 'none';
    };
    window.zMove = (e) => {
        if (e.touches.length === 2) {
            const dist = Math.hypot(e.touches[0].pageX - e.touches[1].pageX, e.touches[0].pageY - e.touches[1].pageY);
            if (lastDist > 0) {
                scale += (dist - lastDist) * 0.01;
                scale = Math.min(Math.max(1, scale), 5);
                document.getElementById('fs-img').style.transform = `scale(${scale})`;
            }
            lastDist = dist;
        }
    };
    window.zStart = (e) => { if (e.touches.length === 2) lastDist = Math.hypot(e.touches[0].pageX - e.touches[1].pageX, e.touches[0].pageY - e.touches[1].pageY); };
    window.zEnd = () => { lastDist = 0; };

    initSync();
</script>
</body>
</html>
